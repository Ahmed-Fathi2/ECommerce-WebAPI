name: E-Commerce API Release

on:
  push:
    branches: 
    - master
  workflow_dispatch:

env:
  PROJECT_PATH: "./ECommerce.API/ECommerce.API.csproj"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4.0.0
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}
      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --no-restore -c Release
      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} -o ${{env.DOTNET_ROOT}}/api --no-build -c Release
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4.3.1
        with:
          name: api-artifact
          path: ${{env.DOTNET_ROOT}}/api
        
  deploy-dev:
    environment: 
      name: 'Dev'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download a Build Artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: api-artifact
      - name: Azure WebApp
        uses: Azure/webapps-deploy@v3.0.0
        id: deploy-to-webapp
        with:
          app-name: 'ecommerce-api-service'
          publish-profile: ${{ secrets.PUBLISH_PROFILE_DEV }}

  deploy-prod:
    environment: 
      name: 'Prod'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - name: Download a Build Artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: api-artifact
      - name: Azure WebApp
        uses: Azure/webapps-deploy@v3.0.0
        id: deploy-to-webapp
        with:
          app-name: 'ecommerce-api-service'
          publish-profile: ${{ secrets.PUBLISH_PROFILE_PROD }}
