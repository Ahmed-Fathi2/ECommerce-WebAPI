name: E-Commerce API CI 🏗️

on:
  workflow_dispatch:
  push:
    branches:
    - master

env:
  PROJECT_PATH: "./ECommerce.API/ECommerce.API.csproj"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore NuGet Packages
        run: dotnet restore ${{ env.PROJECT_PATH }}
        
      - name: Compile and Build Application
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

     # - name: Run Unit Tests
     #  run: dotnet test ./ECommerce.Tests/ECommerce.Tests.csproj --configuration Release --no-build --verbosity normal
