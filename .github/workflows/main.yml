name: Deploy E-Commerce API to Azure 🚀

on:
  workflow_dispatch:
  push:
    branches:
    - main

env:
  AZURE_WEBAPP_NAME: ecommerce-api-service
  AZURE_WEBAPP_PACKAGE_PATH: "./publish"
  PROJECT_PATH: "./ECommerce.API/ECommerce.API.csproj"

jobs:
  build-and-deploy-to-azure:
    name: Build, Publish, and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore NuGet Packages
        run: dotnet restore ${{ env.PROJECT_PATH }}
        
      - name: Compile and Build Application
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      # - name: Run Unit Tests
      #   run: dotnet test ./ECommerce.Tests/ECommerce.Tests.csproj --configuration Release --no-build --verbosity normal
        
      - name: Publish Output Binaries
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}'
        
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: "${{ env.AZURE_WEBAPP_PACKAGE_PATH }}"
